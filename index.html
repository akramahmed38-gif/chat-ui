<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI Assistant</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#343541;
}

.header{
    background:#202123;
    color:white;
    padding:15px;
    font-size:20px;
}

.chat{
    height:calc(100vh - 80px);
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:80%;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    white-space:pre-wrap;
}

.user{
    background:#10a37f;
    color:white;
    margin-left:auto;
}

.assistant{
    background:white;
}

.input-area{
    display:flex;
    padding:10px;
    background:#202123;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#10a37f;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
AI Assistant
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
<input id="message" placeholder="Ask anything...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

const API_URL =
"https://project-h9k2k.vercel.app/api/chat";

function addMessage(text,type){

    const div=document.createElement("div");

    div.className=
        "message "+
        (type==="user"?"user":"assistant");

    div.textContent=text;

    document
      .getElementById("chat")
      .appendChild(div);

    div.scrollIntoView();
}

async function sendMessage(){

    const input =
      document.getElementById("message");

    const message=input.value.trim();

    if(!message) return;

    addMessage(message,"user");

    input.value="";

    const response =
      await fetch(API_URL,{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          message
        })
      });

    const data=
      await response.json();

    addMessage(
      data.reply || data.error,
      "assistant"
    );
}

document
.getElementById("message")
.addEventListener("keydown",e=>{
    if(e.key==="Enter")
        sendMessage();
});
</script>

</body>
</html>
